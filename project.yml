name: StockPulse
options:
  bundleIdPrefix: com.sweta
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug # unoptimized, full debug symbols ✅
  Staging: release # optimized, mimics production build ✅
  Release: release # optimized, production ✅

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    IPHONEOS_DEPLOYMENT_TARGET: 17.0

packages:
  Factory:
    url: https://github.com/hmlongco/Factory
    from: 2.3.0
  Domain:
    path: LocalPackages/Domain
  Data:
    path: LocalPackages/Data
  Features:
    path: LocalPackages/Features

targets:
  StockPulse:
    type: application
    platform: iOS
    configFiles:
      Debug: Configurations/Debug.xcconfig
      Staging: Configurations/Staging.xcconfig
      Release: Configurations/Release.xcconfig
    sources:
      - path: StockPulse
        excludes:
          - "**/*.xcconfig"
    dependencies:
      - package: Factory
      - package: Domain
      - package: Data
      - package: Features
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sweta.stockpulse
        INFOPLIST_FILE: StockPulse/Info.plist
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sweta.stockpulse.debug
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: com.sweta.stockpulse.staging
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: STAGING
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sweta.stockpulse
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE

  StockPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources: StockPulseTests
    dependencies:
      - target: StockPulse
      - package: Domain
      - package: Data

  StockPulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: StockPulseUITests
    dependencies:
      - target: StockPulse
